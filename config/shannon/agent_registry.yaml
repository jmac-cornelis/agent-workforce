- agent_id: hemingway
  display_name: Hemingway
  role: Documentation
  description: Source-grounded documentation generation, impact analysis, and review-gated publication
  zone: intelligence_knowledge
  channel_name: agent-hemingway
  channel_id: 19:7210321d1f45408c94a82b089b543206@thread.tacv2
  team_id: 19:z9bBTJk_jgiLI4kxvTIRgTuqqfBRZGvjCz7jCbUle481@thread.tacv2
  api_base_url: http://host.containers.internal:8203
  approval_types: []
  custom_commands:
  - command: /generate-doc
    description: Generate a documentation record from source files
    api_method: POST
    api_path: /v1/docs/generate
    mutation: true
    params:
    - name: doc_title
      type: str
      required: true
      label: Document title
    - name: doc_type
      type: str
      required: false
      label: 'Type: as_built, engineering_reference, how_to, user_guide, release_note_support (default engineering_reference)'
    - name: project_key
      type: str
      required: false
      label: Jira project key
    - name: doc_summary
      type: str
      required: false
      label: Brief summary of document
    - name: source_paths
      type: list
      required: false
      label: Source files (comma-separated)
    - name: source_refs
      type: list
      required: false
      label: Source references (comma-separated)
    - name: evidence_paths
      type: list
      required: false
      label: Evidence files (comma-separated)
    - name: target_file
      type: str
      required: false
      label: Output file path
    - name: confluence_space
      type: str
      required: false
      label: Confluence space ID
    - name: confluence_parent_id
      type: str
      required: false
      label: Confluence parent page ID
  - command: /impact-detect
    description: Analyze documentation impact of changes
    api_method: POST
    api_path: /v1/docs/impact
    mutation: false
    params:
    - name: doc_title
      type: str
      required: true
      label: Document title
    - name: doc_type
      type: str
      required: false
      label: Document type (default engineering_reference)
    - name: source_paths
      type: list
      required: false
      label: Source files (comma-separated)
  - command: /doc-records
    description: List stored documentation records
    api_method: GET
    api_path: /v1/docs/records
  - command: /doc-record
    description: Get a specific documentation record
    api_method: GET
    api_path: /v1/docs/record
  - command: /publish-doc
    description: Publish an approved documentation record
    api_method: POST
    api_path: /v1/docs/publish
    mutation: true
    params:
    - name: doc_id
      type: str
      required: true
      label: Documentation record ID to publish
    - name: project_key
      type: str
      required: false
      label: Jira project key
  - command: /search-docs
    description: Search Hemingway documentation records by query, project, type, or source
    api_method: POST
    api_path: /v1/docs/search
    mutation: false
    params:
    - name: query
      type: str
      required: false
      label: Search query text
    - name: project_key
      type: str
      required: false
      label: Filter by project key
    - name: doc_type
      type: str
      required: false
      label: Filter by doc type
    - name: source_ref
      type: str
      required: false
      label: Filter by source reference
  - command: /find
    description: Search documentation -- text, user, PR number, or doc type
    api_method: POST
    api_path: /v1/docs/find
    mutation: false
    params:
    - name: text
      type: str
      required: true
      label: Search text
  - command: /pr-review
    description: Analyze a PR and generate documentation
    api_method: POST
    api_path: /v1/docs/pr-review
    mutation: true
    params:
    - name: repo
      type: str
      required: true
      label: Repository (owner/repo)
    - name: pr_number
      type: int
      required: true
      label: PR number
    - name: target_dir
      type: str
      required: false
      label: Target docs directory
  - command: /confluence-publish
    description: Publish a markdown file to Confluence with diagram rendering
    api_method: POST
    api_path: /v1/docs/confluence/publish-page
    mutation: true
    params:
    - name: title
      type: str
      required: true
      label: Confluence page title
    - name: input_file
      type: str
      required: true
      label: Path to markdown file
    - name: space
      type: str
      required: false
      label: Confluence space ID
    - name: parent_id
      type: str
      required: false
      label: Parent page ID
    - name: parent_url
      type: str
      required: false
      label: Confluence parent page URL (alternative to space + parent_id)
    - name: operation
      type: str
      required: false
      label: 'Operation: create, update, append, update_section (default create)'
    - name: page_id_or_title
      type: str
      required: false
      label: Existing page ID/title (for update/append)
  - command: /reindex
    description: Re-index existing docs from a GitHub repo
    api_method: POST
    api_path: /v1/docs/reindex
    mutation: true
    params:
    - name: repo
      type: str
      required: true
      label: GitHub repo (owner/name)
    - name: docs_dir
      type: str
      required: false
      label: Docs directory (default docs)
    - name: branch
      type: str
      required: false
      label: Branch (default main)
  - command: /voice-config
    description: View or change documentation voice/tone settings
    api_method: GET
    api_path: /v1/config/voice
  - command: /ask
    description: "Natural language query \u2014 search docs, generate docs, check impact"
    api_method: POST
    api_path: /v1/nl/query
    params:
    - name: query
      type: str
      required: true
      label: Natural language query
  timeout_seconds: 60
  notifications_webhook_url: https://default4dbdb7da74ee4b458747ef5ce5ebe6.8a.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/051941a064934a7983337addd4bd8a2c/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=CzuSh58kSVUiAU6V0j8y2NDNClUln2XSUP_O2UTfv0M
