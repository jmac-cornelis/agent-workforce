agents:
  - agent_id: shannon
    display_name: Shannon
    role: Communications
    description: Single Teams bot and routing surface for the Cornelis agent workforce.
    zone: service_infrastructure
    channel_name: agent-shannon
    channel_id: "19:z9bBTJk_jgiLI4kxvTIRgTuqqfBRZGvjCz7jCbUle481@thread.tacv2"
    team_id: "19:z9bBTJk_jgiLI4kxvTIRgTuqqfBRZGvjCz7jCbUle481@thread.tacv2"
    api_base_url: ""
    approval_types: []
    custom_commands:
      - command: /stats
        description: Shannon service status and throughput
        api_method: GET
        api_path: /v1/status/stats
      - command: /busy
        description: Current Shannon load summary
        api_method: GET
        api_path: /v1/status/load
      - command: /work-today
        description: Today's work summary for Shannon
        api_method: GET
        api_path: /v1/status/work-summary
      - command: /token-status
        description: Deterministic/token execution summary
        api_method: GET
        api_path: /v1/status/tokens
      - command: /decision-tree
        description: Recent routing and posting decisions
        api_method: GET
        api_path: /v1/status/decisions
      - command: /why
        description: Deep dive into a specific decision
        api_method: GET
        api_path: /v1/status/decisions/{record_id}
    timeout_seconds: 15

  - agent_id: drucker
    display_name: Drucker
    role: Engineering Hygiene
    description: Deterministic engineering hygiene analysis — Jira ticket quality and GitHub PR lifecycle
    zone: service_infrastructure
    channel_name: agent-drucker
    channel_id: "19:966aaabccc2a4ecd879d427edc83aaf0@thread.tacv2"
    team_id: "19:z9bBTJk_jgiLI4kxvTIRgTuqqfBRZGvjCz7jCbUle481@thread.tacv2"
    api_base_url: http://localhost:8201
    notifications_webhook_url: "https://default4dbdb7da74ee4b458747ef5ce5ebe6.8a.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/7346f433283a433fb6a530451879227b/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=DX5rVpdRL5wpv_H9huN668nWIvrhGTWwe97q6NGpxh4"
    approval_types: []
    custom_commands:
      # --- Jira hygiene commands ---
      - command: /issue-check
        description: Run intake validation for one Jira ticket
        api_method: POST
        api_path: /v1/hygiene/issue
        mutation: false
      - command: /intake-report
        description: Run a recent-ticket intake report
        api_method: POST
        api_path: /v1/hygiene/intake
        mutation: false
      - command: /hygiene-run
        description: Run hygiene analysis
        api_method: POST
        api_path: /v1/hygiene/run
        mutation: false
      - command: /hygiene-report
        description: Get a stored report
        api_method: GET
        api_path: /v1/hygiene/report
      - command: /hygiene-list
        description: List stored reports
        api_method: GET
        api_path: /v1/hygiene/reports
      - command: /bug-activity
        description: Bug ticket activity today (opened, status changes, comments)
        api_method: POST
        api_path: /v1/activity/bugs
      # --- GitHub PR hygiene commands ---
      - command: /pr-hygiene
        description: Full PR hygiene scan — stale PRs and missing reviews
        api_method: POST
        api_path: /v1/github/pr-hygiene
        mutation: false
      - command: /pr-stale
        description: Find stale PRs with no activity
        api_method: POST
        api_path: /v1/github/pr-stale
        mutation: false
      - command: /pr-reviews
        description: Find PRs missing code review
        api_method: POST
        api_path: /v1/github/pr-reviews
        mutation: false
      - command: /pr-list
        description: List open PRs for a repository
        api_method: GET
        api_path: /v1/github/prs
      # --- GitHub extended hygiene commands ---
      - command: /naming-compliance
        description: Check branch/PR naming compliance against Jira conventions
        api_method: POST
        api_path: /v1/github/naming-compliance
        mutation: false
      - command: /merge-conflicts
        description: Find open PRs with merge conflicts
        api_method: POST
        api_path: /v1/github/merge-conflicts
        mutation: false
      - command: /ci-failures
        description: Find open PRs with failing CI checks
        api_method: POST
        api_path: /v1/github/ci-failures
        mutation: false
      - command: /stale-branches
        description: Find stale branches with no activity and no open PRs
        api_method: POST
        api_path: /v1/github/stale-branches
        mutation: false
      - command: /extended-hygiene
        description: Run comprehensive extended hygiene analysis (all scan types)
        api_method: POST
        api_path: /v1/github/extended-hygiene
        mutation: false
    timeout_seconds: 30

  - agent_id: gantt
    display_name: Gantt
    role: Project Planning
    description: Planning snapshots and release-health monitoring for Jira-backed delivery work.
    zone: planning_delivery
    channel_name: agent-gantt
    channel_id: ""
    team_id: "19:z9bBTJk_jgiLI4kxvTIRgTuqqfBRZGvjCz7jCbUle481@thread.tacv2"
    api_base_url: http://localhost:8202
    approval_types: []
    custom_commands:
      - command: /planning-snapshot
        description: Create a planning snapshot
        api_method: POST
        api_path: /v1/planning/snapshot
        mutation: false
      - command: /planning-snapshots
        description: List stored planning snapshots
        api_method: GET
        api_path: /v1/planning/snapshots
      - command: /release-monitor
        description: Create a release monitor report
        api_method: POST
        api_path: /v1/release-monitor/run
        mutation: false
      - command: /release-survey
        description: Create a release execution survey
        api_method: POST
        api_path: /v1/release-survey/run
        mutation: false
      - command: /release-report
        description: Get a stored release monitor report
        api_method: GET
        api_path: /v1/release-monitor/report
      - command: /release-reports
        description: List stored release monitor reports
        api_method: GET
        api_path: /v1/release-monitor/reports
      - command: /release-survey-report
        description: Get a stored release survey
        api_method: GET
        api_path: /v1/release-survey/report
      - command: /release-survey-reports
        description: List stored release surveys
        api_method: GET
        api_path: /v1/release-survey/reports
    timeout_seconds: 30

  - agent_id: hypatia
    display_name: Hypatia
    role: Documentation
    description: Source-grounded documentation generation, impact analysis, and review-gated publication
    zone: intelligence_knowledge
    channel_name: agent-hypatia
    channel_id: ""
    team_id: "19:z9bBTJk_jgiLI4kxvTIRgTuqqfBRZGvjCz7jCbUle481@thread.tacv2"
    api_base_url: http://localhost:8203
    approval_types: []
    custom_commands:
      - command: /generate-doc
        description: Generate a documentation record from source files
        api_method: POST
        api_path: /v1/docs/generate
        mutation: true
      - command: /impact-detect
        description: Analyze documentation impact of changes
        api_method: POST
        api_path: /v1/docs/impact
        mutation: false
      - command: /doc-records
        description: List stored documentation records
        api_method: GET
        api_path: /v1/docs/records
      - command: /doc-record
        description: Get a specific documentation record
        api_method: GET
        api_path: /v1/docs/record
      - command: /publish-doc
        description: Publish an approved documentation record
        api_method: POST
        api_path: /v1/docs/publish
        mutation: true
      - command: /search-docs
        description: Search Hypatia documentation records by query, project, type, or source
        api_method: POST
        api_path: /v1/docs/search
        mutation: false
    timeout_seconds: 60
