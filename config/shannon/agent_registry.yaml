      - command: /release-survey
        description: Create a release execution survey
        api_method: POST
        api_path: /v1/release-survey/run
        mutation: false
        params:
          - name: project_key
            type: str
            required: true
            label: Jira project key
      - command: /release-report
        description: Get a stored release monitor report
        api_method: GET
        api_path: /v1/release-monitor/report
      - command: /release-reports
        description: List stored release monitor reports
        api_method: GET
