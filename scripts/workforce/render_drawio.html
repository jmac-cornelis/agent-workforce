<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
body { margin: 0; padding: 0; background: white; }
#graph { width: 1200px; height: 600px; overflow: hidden; }
</style>
</head>
<body>
<div id="graph"></div>
<script src="https://viewer.diagrams.net/js/viewer-static.min.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const page = parseInt(params.get('page') || '0');

fetch(params.get('file'))
  .then(r => r.text())
  .then(xml => {
    const container = document.getElementById('graph');
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    const diagrams = doc.querySelectorAll('diagram');
    const diagram = diagrams[page];
    if (!diagram) { container.innerHTML = 'No page ' + page; return; }

    const wrapper = doc.createElement('mxfile');
    wrapper.appendChild(diagram.cloneNode(true));
    const singleXml = new XMLSerializer().serializeToString(wrapper);

    container.innerHTML = '';
    const div = document.createElement('div');
    div.className = 'mxgraph';
    div.setAttribute('data-mxgraph', JSON.stringify({
      highlight: '#0000ff',
      nav: false,
      resize: true,
      toolbar: null,
      edit: null,
      xml: singleXml
    }));
    container.appendChild(div);
    GraphViewer.createViewerForElement(div);

    window._renderDone = true;
  });
</script>
</body>
</html>
