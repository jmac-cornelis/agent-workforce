##########################################################################################
# Hedy Release Manager Agent Configuration
# Author: Cornelis Networks
##########################################################################################

agent_id: hedy
display_name: Hedy
zone: execution_spine
phase: 5
description: >
  Release Manager Agent. Orchestrates release decisions using the Fuze
  release model with stage promotion (sit, qa, release) and human
  approval gates. Evaluates readiness from build, version, test, and
  traceability evidence.

model: null
temperature: 0.2
max_iterations: 12
timeout_seconds: 300

events:
  consumes:
    - build.completed
    - test.execution_completed
  produces:
    - release.candidate_created
    - release.approval_requested
    - release.promoted
    - release.blocked
    - release.deprecated

dependencies:
  - josephine
  - faraday
  - babbage
  - linnaeus
  - event_bus
