defaults:
  project_key: ''
  limit: 200
  include_done: false
  stale_days: 30
  label_prefix: drucker
  persist: true
  notify_shannon: false
  github_stale_days: 5
  github_repos:
    - jmac-cornelis/agent-workforce
    - cornelisnetworks/ifs-all
    - cornelisnetworks/opa400-port-manager
    - cornelisnetworks/opa400-meta-cornelis
    - cornelisnetworks/opa400-cli
    - cornelisnetworks/opa400-FirmwareTools
    - cornelisnetworks/emb-dev-tools
    - cornelisnetworks/libfabric-internal
    - cornelisnetworks/openbmc-linux
    - cornelisnetworks/wfr-linux-devel
    - cornelisnetworks/scm-jenkins-shared-library
    - cornelisnetworks/swvl
    - cornelisnetworks/hfisvc_client
    - cornelisnetworks/libfabric-devel
    - cornelisnetworks/wfr-pcie-gen3
    - cornelisnetworks/bmc-all
    - cornelisnetworks/brandy
    - cornelisnetworks/opa-distro-drivers-internal
    - cornelisnetworks/scm-tools
    - cornelisnetworks/opa400-MFG
    - cornelisnetworks/wfr-driver
    - cornelisnetworks/cn-fabric-k8s

    - cornelisnetworks/rdma-core-internal
    - cornelisnetworks/opa-psm2
    - cornelisnetworks/opa-psm3

jobs:
  - job_id: hygiene-scan
    description: Full-project hygiene scan for active work.
    scan_type: jira
    recent_only: false

  - job_id: recent-ticket-intake
    description: Recent-ticket intake scan using Drucker checkpoint state.
    scan_type: jira
    recent_only: true

  - job_id: github-hygiene-scan
    description: GitHub PR hygiene scan for stale PRs and missing reviews.
    scan_type: github
    enabled: false
    github_stale_days: 5

  - job_id: github-extended-scan
    description: Extended GitHub hygiene scan including naming, conflicts, CI, and stale branches.
    scan_type: github-extended
    enabled: false
    github_stale_days: 5
    branch_stale_days: 30

  - job_id: github-pr-reminders
    description: Scan repos for stale PRs and send Teams DM reminders to authors and reviewers.
    scan_type: github-pr-reminders
    enabled: false
