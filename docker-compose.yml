    environment:
      - PORT=8203
      - AGENT_ID=hypatia
    env_file:
      - config/env/shared.env
      - config/env/llm.env

  # =========================================================================
  # Future agent services (profile: future — not started by default)
  # Start explicitly: docker compose --profile future up <service>
  # Port allocation: 82xx per host group
  # =========================================================================

  josephine:
    <<: *agent-base
    container_name: josephine
    profiles: ["future"]
    command: ["uvicorn", "agents.josephine_api:app", "--host", "0.0.0.0", "--port", "8210"]
    ports:
      - "8210:8210"
    environment:
      - PORT=8210
      - AGENT_ID=josephine
    env_file:
      - config/env/shared.env
      - config/env/github.env

  ada:
    <<: *agent-base
    container_name: ada
    profiles: ["future"]
