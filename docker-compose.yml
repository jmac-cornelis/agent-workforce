# ==========================================================================
# Cornelis Networks — AI Agent Workforce Docker Compose
# ==========================================================================
# Architecture: single-image multi-entrypoint deployment.
#   All agent services share the cornelis/agent-workforce image; each
#   service overrides the entrypoint command to launch its own FastAPI app.
#
# Credentials: organised into credential-domain env files under config/env/.
#   shared.env  — common settings (database URLs, log level, etc.)
#   jira.env    — Jira API token and base URL
#   llm.env     — LLM provider keys (OpenAI / Azure OpenAI)
#   github.env  — GitHub PAT and org settings
#   teams.env   — Microsoft Teams webhook / Azure AD creds
#
# Host deployment: this is a single Compose file. Host distribution across
#   multiple machines is handled by Ansible at deploy time — do NOT split
#   this file per host.
#
# Port scheme: 82xx — each agent is assigned a unique port in the 8200 range.
#
# Profiles:
#   default  — starts infrastructure + implemented agents (shannon, drucker,
#              gantt, hypatia)
#   future   — reserved slots for agents not yet implemented; start
#              explicitly: docker compose --profile future up josephine
# ==========================================================================

version: '3.8'

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  workforce-net:
    driver: bridge

# ---------------------------------------------------------------------------
# Named volumes
# ---------------------------------------------------------------------------
volumes:
  pg-data:        # PostgreSQL data
  redis-data:     # Redis data
  agent-state:    # Shared agent state (JSON / SQLite stores)
  agent-logs:     # Shared log volume
  agent-artifacts: # Build / test artifacts

# ---------------------------------------------------------------------------
# Shared agent base (YAML anchor — DRY)
# ---------------------------------------------------------------------------
x-agent-base: &agent-base
  image: cornelis/agent-workforce:${IMAGE_TAG:-latest}
  restart: unless-stopped
  networks:
    - workforce-net
  volumes:
    - agent-state:/data/state
    - agent-logs:/data/logs
    - ./config:/app/config:ro
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  healthcheck:
    test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${PORT}/health')"]
    interval: 30s
    timeout: 10s
    retries: 3

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # =========================================================================
  # Infrastructure services
  # =========================================================================

  postgres:
    image: postgres:16-bookworm
    container_name: postgres
    restart: unless-stopped
    networks:
      - workforce-net
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=workforce
      - POSTGRES_USER=workforce
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workforce"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-bookworm
    container_name: redis
    restart: unless-stopped
    networks:
      - workforce-net
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:stable
    container_name: nginx
    restart: unless-stopped
    networks:
      - workforce-net
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - shannon
      - drucker
      - gantt
      - hypatia

  # =========================================================================
  # Implemented agent services (started by default)
  # Port allocation: 82xx per host group
  # =========================================================================

  shannon:
    <<: *agent-base
    container_name: shannon
    command: ["uvicorn", "shannon.app:app", "--host", "0.0.0.0", "--port", "8200"]
    ports:
      - "8200:8200"
    environment:
      - PORT=8200
      - AGENT_ID=shannon
    env_file:
      - config/env/shared.env
      - config/env/llm.env
      - config/env/teams.env

  drucker:
    <<: *agent-base
    container_name: drucker
    command: ["uvicorn", "agents.drucker.api:app", "--host", "0.0.0.0", "--port", "8201"]
    ports:
      - "8201:8201"
    environment:
      - PORT=8201
      - AGENT_ID=drucker
    env_file:
      - config/env/shared.env
      - config/env/jira.env
      - config/env/llm.env
      - config/env/github.env

  gantt:
    <<: *agent-base
    container_name: gantt
    command: ["uvicorn", "agents.gantt.api:app", "--host", "0.0.0.0", "--port", "8202"]
    ports:
      - "8202:8202"
    environment:
      - PORT=8202
      - AGENT_ID=gantt
    env_file:
      - config/env/shared.env
      - config/env/jira.env
      - config/env/llm.env

  hypatia:
    <<: *agent-base
    container_name: hypatia
    command: ["uvicorn", "agents.hypatia_api:app", "--host", "0.0.0.0", "--port", "8203"]
